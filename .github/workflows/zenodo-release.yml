name: Zenodo DOI Registration

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: zenodo-${{ github.repository }}-${{ github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  register-doi:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for Zenodo webhook
        if: ${{ github.event_name == 'release' }}
        run: sleep 90

      - name: Poll Zenodo for DOI
        id: zenodo
        shell: bash
        run: |
          set -euo pipefail
          REPO_URL="https://github.com/${{ github.repository }}"
          REPO_NAME="${{ github.repository }}"
          echo "Searching Zenodo for repository base: $REPO_URL"

          DOI=$(python3 - <<'PY' "$REPO_NAME"
import sys

repo = sys.argv[1]
preferred = {
    "AIUZ-Terra-Codex-EcoSystem/AIUZ-Terra-Ecosystem": "10.5281/zenodo.18860027",
    "AIUZ-Terra-Codex-EcoSystem/Nullo-PLT-FMP-Theory": "10.5281/zenodo.19189085",
    "AIUZ-Terra-Codex-EcoSystem/github": "10.5281/zenodo.18860023",
    "AIUZ-Terra-Codex-EcoSystem/terra-legal": "10.5281/zenodo.18860025",
    "Secret-Uzbek/AIUZ": "10.5281/zenodo.18860029",
    "Secret-Uzbek/AIUZ-Terra-codex": "10.5281/zenodo.18860223",
    "Secret-Uzbek/AIUZ-terra-codex-FMP": "10.5281/zenodo.18860225",
    "Secret-Uzbek/FMP-CENTRAL-REPO": "10.5281/zenodo.17731795",
    "Secret-Uzbek/FMP-Full-Publication-Package": "10.5281/zenodo.19189042",
    "Secret-Uzbek/FMP-monograph": "10.5281/zenodo.17598953",
    "Secret-Uzbek/Theory-of-fractal-metascience-paradigm": "10.5281/zenodo.18860033",
    "Secret-Uzbek/Uzbek-mining": "10.5281/zenodo.18860031",
    "Secret-Uzbek/babur-terra-codex": "10.5281/zenodo.18780897",
    "Secret-Uzbek/navoiy-terra-corpus": "10.5281/zenodo.18676066",
    "Secret-Uzbek/terra-fmp-research-pipeline": "10.5281/zenodo.18061978",
    "Secret-Uzbek/terra-translation-api": "10.5281/zenodo.18860037",
    "Secret-Uzbek/terra-ust-autobuild": "10.5281/zenodo.18860035",
    "Secret-Uzbek/ust-mvp": "10.5281/zenodo.18860041",
    "Secret-Uzbek/women-made-central-asia": "10.5281/zenodo.19188951",
    "Secret-Uzbek/women-made-central-asia-corpus": "10.5281/zenodo.19188970",
    "Secret-Uzbek/ziyarat-terra-corpus": "10.5281/zenodo.19187958",
}
print(preferred.get(repo, ""))
PY
)

          if [ -n "$DOI" ]; then
            echo "doi=$DOI" >> "$GITHUB_OUTPUT"
            echo "Using preferred DOI from ORCID/DataCite mapping: $DOI"
            exit 0
          fi

          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt..."
            RESPONSE=$(curl -fsSL "https://zenodo.org/api/records?q=$REPO_URL&sort=mostrecent&size=25" || echo "")
            DOI=$(printf "%s" "$RESPONSE" | python3 - <<'PY' "$REPO_URL"
import json
import sys

repo_url = sys.argv[1]
payload = sys.stdin.read().strip()
if not payload:
    raise SystemExit(0)

try:
    data = json.loads(payload)
except Exception:
    raise SystemExit(0)

hits = data.get("hits", {}).get("hits", [])
for hit in hits:
    related = hit.get("metadata", {}).get("related_identifiers", []) or []
    for item in related:
        identifier = item.get("identifier", "") or ""
        if identifier.startswith(repo_url):
            doi = hit.get("doi") or hit.get("metadata", {}).get("doi", "")
            if doi:
                print(doi)
                raise SystemExit(0)
PY
)

            if [ -n "$DOI" ]; then
              echo "doi=$DOI" >> "$GITHUB_OUTPUT"
              echo "Found DOI: $DOI"
              exit 0
            fi

            echo "DOI not found yet, waiting 60s..."
            sleep 60
          done

          echo "Zenodo DOI not found after polling window." >> "$GITHUB_STEP_SUMMARY"

      - name: Update CITATION.cff
        if: steps.zenodo.outputs.doi != ''
        shell: bash
        run: |
          set -euo pipefail
          DOI="${{ steps.zenodo.outputs.doi }}"
          VERSION="${{ github.event.release.tag_name || github.ref_name }}"
          DATE=$(date +%Y-%m-%d)

          python3 - <<'PY' "$DOI" "$VERSION" "$DATE" "${{ github.repository }}"
import pathlib
import re
import sys

doi, version, date, repo = sys.argv[1:]
path = pathlib.Path("CITATION.cff")

if path.exists():
    content = path.read_text(encoding="utf-8")
else:
    content = f'''cff-version: 1.2.0
message: "If you use this software, please cite it as below."
type: software
title: "{repo.split('/')[-1]}"
repository-code: "https://github.com/{repo}"
url: "https://github.com/{repo}"
'''

updates = {
    "doi": doi,
    "version": version,
    "date-released": date,
    "url": f"https://doi.org/{doi}",
}

for key, value in updates.items():
    pattern = rf"^(#\s*)?{re.escape(key)}:.*$"
    if re.search(pattern, content, flags=re.MULTILINE):
        content = re.sub(pattern, f"{key}: {value}", content, flags=re.MULTILINE)
    else:
        if not content.endswith("\\n"):
            content += "\\n"
        content += f"{key}: {value}\\n"

path.write_text(content, encoding="utf-8")
PY

      - name: Commit CITATION.cff
        if: steps.zenodo.outputs.doi != ''
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git diff --staged --quiet || git commit -m "chore: update CITATION.cff with DOI ${{ steps.zenodo.outputs.doi }}"
          git push
