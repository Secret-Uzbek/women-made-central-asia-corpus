name: zenodo-release

on:
  workflow_dispatch:
    inputs:
      zenodo_doi:
        description: "Zenodo DOI to write into CITATION.cff"
        required: false
        type: string
      release_version:
        description: "Optional version string to write into CITATION.cff"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: zenodo-${{ github.repository }}
  cancel-in-progress: false

jobs:
  update-citation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB || secrets.GHP_TOKEN || github.token }}

      - name: Resolve metadata
        id: meta
        shell: bash
        env:
          DOI_INPUT: ${{ inputs.zenodo_doi }}
          VERSION_INPUT: ${{ inputs.release_version }}
        run: |
          set -euo pipefail

          current_doi="$(sed -n 's/^doi:[[:space:]]*//p' CITATION.cff | head -n 1 | tr -d '\"')"
          current_version="$(sed -n 's/^version:[[:space:]]*//p' CITATION.cff | head -n 1 | tr -d '\"')"
          today="$(date +%Y-%m-%d)"

          doi="${DOI_INPUT:-$current_doi}"
          version="${VERSION_INPUT:-$current_version}"

          if [ -z "$doi" ]; then
            echo "No DOI available. Supply workflow input zenodo_doi or add doi to CITATION.cff." >&2
            exit 1
          fi

          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME:-manual}"
          fi

          {
            echo "doi=$doi"
            echo "version=$version"
            echo "today=$today"
          } >> "$GITHUB_OUTPUT"

      - name: Normalize CITATION.cff
        shell: bash
        env:
          DOI: ${{ steps.meta.outputs.doi }}
          PUSH_TOKEN: ${{ secrets.GITHUB || secrets.GHP_TOKEN || github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          TODAY: ${{ steps.meta.outputs.today }}
          REPOSITORY_CODE: https://github.com/${{ github.repository }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import pathlib
          import re

          path = pathlib.Path("CITATION.cff")
          content = path.read_text(encoding="utf-8")

          updates = {
              "doi": f"\"{os.environ['DOI']}\"",
              "url": f"\"https://doi.org/{os.environ['DOI']}\"",
              "version": f"\"{os.environ['VERSION']}\"",
              "date-released": f"\"{os.environ['TODAY']}\"",
              "repository-code": f"\"{os.environ['REPOSITORY_CODE']}\"",
          }

          for key, value in updates.items():
              pattern = rf"^{re.escape(key)}:.*$"
              if re.search(pattern, content, flags=re.MULTILINE):
                  content = re.sub(pattern, f"{key}: {value}", content, flags=re.MULTILINE)
              else:
                  if not content.endswith("\n"):
                      content += "\n"
                  content += f"{key}: {value}\n"

          path.write_text(content, encoding="utf-8")
          PY

      - name: Commit CITATION.cff if changed
        shell: bash
        env:
          DOI: ${{ steps.meta.outputs.doi }}
          PUSH_TOKEN: ${{ secrets.GITHUB || secrets.GHP_TOKEN || github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add CITATION.cff
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync CITATION.cff with Zenodo DOI ${DOI}"
            git push
          fi

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Zenodo release sync"
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- DOI: \`${{ steps.meta.outputs.doi }}\`"
            echo "- Version: \`${{ steps.meta.outputs.version }}\`"
            echo "- Date released: \`${{ steps.meta.outputs.today }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
