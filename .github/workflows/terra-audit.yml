name: terra-audit

on:
  workflow_dispatch:
    inputs:
      fail_on_missing:
        description: "Fail when core files are missing"
        required: false
        default: false
        type: boolean
      fail_on_mojibake:
        description: "Fail when mojibake markers are detected"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: terra-audit-${{ github.repository }}
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Terra audit
        shell: bash
        env:
          FAIL_ON_MISSING: ${{ inputs.fail_on_missing }}
          FAIL_ON_MOJIBAKE: ${{ inputs.fail_on_mojibake }}
        run: |
          set -euo pipefail

          missing=0
          mojibake=0

          echo "## Terra audit" >> "$GITHUB_STEP_SUMMARY"
          echo "- Repository: \`${{ github.repository }}\`" >> "$GITHUB_STEP_SUMMARY"

          check_one() {
            local label="$1"
            shift
            for file in "$@"; do
              if [ -f "$file" ]; then
                echo "- $label: YES ($file)" >> "$GITHUB_STEP_SUMMARY"
                return 0
              fi
            done
            echo "- $label: NO" >> "$GITHUB_STEP_SUMMARY"
            missing=1
            return 1
          }

          check_one "README" "README.md" || true
          check_one "CITATION" "CITATION.cff" || true
          check_one "LIVING_INDEX" "LIVING_INDEX.md" || true
          check_one "CHANGELOG" "CHANGELOG.md" || true
          check_one "LICENSE" "LICENSE" "LICENSE.md" || true
          check_one "SECURITY" "SECURITY.md" ".github/SECURITY.md" || true

          python3 - <<'PY'
          from pathlib import Path
          import re

          marker_re = re.compile("|".join([
              "\u00D0.",
              "\u00D1.",
              "\uFFFD",
          ]))
          hits = []
          for path in Path('.').rglob('*'):
              if not path.is_file():
                  continue
              if '.git' in path.parts:
                  continue
              if path.name == 'terra-audit.yml' and '.github' in path.parts:
                  continue
              if path.suffix.lower() not in {'.md', '.cff', '.yml', '.yaml'}:
                  continue
              try:
                  text = path.read_text(encoding='utf-8', errors='replace')
              except Exception:
                  continue
              for idx, line in enumerate(text.splitlines(), start=1):
                  if marker_re.search(line):
                      hits.append(f"{path.as_posix()}:{idx}:{line}")
          Path('terra-mojibake-hits.txt').write_text("
".join(hits) + ("
" if hits else ""), encoding='utf-8')
          raise SystemExit(0 if hits else 1)
          PY
          if [ -s terra-mojibake-hits.txt ]; then
            mojibake=1
            {
              echo ""
              echo "### Mojibake hot spots"
              head -n 40 terra-mojibake-hits.txt
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$missing" -ne 0 ] && [ "${FAIL_ON_MISSING}" = "true" ]; then
            echo "Missing required Terra surface." >&2
            exit 1
          fi

          if [ "$mojibake" -ne 0 ] && [ "${FAIL_ON_MOJIBAKE}" = "true" ]; then
            echo "Mojibake detected." >&2
            exit 1
          fi

